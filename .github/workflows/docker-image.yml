name: Docker Image

on:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository without default token
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}" || git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set image build date
        id: build-date
        run: printf 'created=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=0.02-dev,enable=${{ startsWith(github.ref, 'refs/tags/v0.02') }}
            type=sha,prefix=sha-

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: splendor:publish-smoke
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SPLENDOR_IMAGE_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.created }}

      - name: Smoke test image before publish
        env:
          SPLENDOR_CONTAINER_IMAGE: splendor:publish-smoke
          SPLENDOR_CONTAINER_BUILD: "0"
        run: bash scripts/container-tests.sh

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SPLENDOR_IMAGE_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.created }}
