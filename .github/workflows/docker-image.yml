name: Docker Image

on:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_0_02_dev:
        description: Publish the 0.02-dev and v0.02-dev image tags from this ref.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository without default token
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}" || git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set image build date
        id: build-date
        run: printf 'created=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Splendor Kernel
            org.opencontainers.image.description=Splendor 0.02-dev local runtime deployment image
            org.opencontainers.image.licenses=Apache-2.0 OR MIT

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: splendor:publish-smoke
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SPLENDOR_IMAGE_VERSION=${{ inputs.publish_0_02_dev == true && 'v0.02-dev' || github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.created }}

      - name: Smoke test image before publish
        env:
          SPLENDOR_CONTAINER_IMAGE: splendor:publish-smoke
          SPLENDOR_CONTAINER_BUILD: "0"
        run: bash scripts/container-tests.sh

  publish-platform:
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository without default token
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}" || git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set image build date
        id: build-date
        run: printf 'created=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Splendor Kernel
            org.opencontainers.image.description=Splendor 0.02-dev local runtime deployment image
            org.opencontainers.image.licenses=Apache-2.0 OR MIT

      - name: Build and push platform image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            SPLENDOR_IMAGE_VERSION=${{ inputs.publish_0_02_dev == true && 'v0.02-dev' || github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.created }}

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    needs: publish-platform
    runs-on: ubuntu-latest
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=0.02-dev,enable=${{ startsWith(github.ref, 'refs/tags/v0.02') }}
            type=raw,value=0.02-dev,enable=${{ inputs.publish_0_02_dev == true }}
            type=raw,value=v0.02-dev,enable=${{ inputs.publish_0_02_dev == true }}
            type=sha,prefix=sha-

      - name: Create and publish multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          DOCKER_METADATA_OUTPUT_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tags=()
          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              tags+=("-t" "${tag}")
            fi
          done <<< "${DOCKER_METADATA_OUTPUT_TAGS}"

          sources=()
          for digest in *; do
            sources+=("${REGISTRY}/${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create "${tags[@]}" "${sources[@]}"

      - name: Inspect published image
        run: docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"

      - name: Optionally make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GHCR_VISIBILITY_TOKEN }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice title=GHCR visibility not changed::No GHCR_VISIBILITY_TOKEN secret is configured; set the package visibility manually for public unauthenticated pulls."
            {
              echo "### GHCR package visibility"
              echo
              echo "No \`GHCR_VISIBILITY_TOKEN\` secret is configured, so this workflow did not change package visibility."
              echo "Publishing still completed, but first-time public pulls require a package admin to make the GHCR package public manually or configure that secret."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          gh api --method PATCH \
            "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME}/visibility" \
            -f visibility=public
