trace_db: ./examples/single_agent_loop/data/trace.db
state_db: ./examples/single_agent_loop/data/state.db
run_id: "22222222-2222-2222-2222-222222222222"
tick_interval_ms: 200
cycles: 2
allow_unsigned_local_run: true
tenants:
  - id: "11111111-1111-1111-1111-111111111111"
    allowed_actions:
      - write_file
    allowed_adapters:
      - filesystem
agents:
  - tenant_id: "11111111-1111-1111-1111-111111111111"
    snapshot_interval: 1
    initial_state: "seed"
    policy:
      type: increment
      action:
        name: write_file
        adapter: filesystem
        side_effect_class: filesystem
        params:
          path: "tick_{counter}.txt"
          contents: "hello {counter}"
adapters:
  filesystem:
    base_dir: ./examples/single_agent_loop/data
