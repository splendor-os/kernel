trace_db: ./examples/local-basic-loop/data/trace.db
state_db: ./examples/local-basic-loop/data/state.db
run_id: "22222222-2222-2222-2222-222222222222"
cycles: 1
tenants:
  - id: "11111111-1111-1111-1111-111111111111"
    allowed_actions:
      - write_file
    allowed_adapters:
      - filesystem
    quotas:
      max_actions_per_tick: 2
      max_filesystem_write_bytes: 1048576
agents:
  - id: "33333333-3333-3333-3333-333333333333"
    tenant_id: "11111111-1111-1111-1111-111111111111"
    run_id: "22222222-2222-2222-2222-222222222222"
    snapshot_interval: 1
    initial_state: "seed"
    percepts:
      - schema: splendor.example.local_input.v1
        payload:
          instruction: write local artifact
        source: example.local-basic-loop
    policy:
      type: static
      next_state: "local-basic-complete"
      actions:
        - name: write_file
          adapter: filesystem
          side_effect_class: filesystem
          params:
            path: "tick_1.txt"
            contents: "hello from Splendor 0.01"
adapters:
  filesystem:
    base_dir: ./examples/local-basic-loop/data
